<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TravelTalk Voice</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080c14;
  --surface: #0f1624;
  --accent: #00e5ff;
  --accent2: #7c3aed;
  --warm: #ff6b35;
  --text: #e8edf5;
  --muted: #4a5568;
  --glow: rgba(0,229,255,0.18);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  touch-action: manipulation;
}

/* ── STARFIELD BG ── */
#canvas-bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── LAYOUT ── */
#app {
  position: relative; z-index: 1;
  width: 100%; height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 24px 20px 32px;
}

/* ── HEADER ── */
.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--accent);
  text-transform: uppercase;
}
.scenario-badge {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--accent);
  color: var(--accent);
  background: rgba(0,229,255,0.06);
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.2s;
}
.scenario-badge:active { background: rgba(0,229,255,0.18); }

/* ── STATUS PILL ── */
.status-pill {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 4px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--muted);
  color: var(--muted);
  transition: all 0.3s;
}
.status-pill.listening {
  background: rgba(255,107,53,0.15);
  border-color: var(--warm);
  color: var(--warm);
}
.status-pill.speaking {
  background: rgba(0,229,255,0.12);
  border-color: var(--accent);
  color: var(--accent);
}
.status-pill.thinking {
  background: rgba(124,58,237,0.15);
  border-color: var(--accent2);
  color: var(--accent2);
}

/* ── AVATAR ── */
.avatar-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  flex: 1;
  justify-content: center;
}

.avatar-ring-outer {
  position: relative;
  width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
}

/* Pulsing rings */
.ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  opacity: 0;
  transition: opacity 0.3s;
}
.ring-1 { width: 100%; height: 100%; animation: none; }
.ring-2 { width: 120%; height: 120%; left: -10%; top: -10%; animation: none; }
.ring-3 { width: 140%; height: 140%; left: -20%; top: -20%; animation: none; }

.speaking-active .ring-1 { opacity: 0.5; animation: pulse-ring 1.4s ease-out infinite; }
.speaking-active .ring-2 { opacity: 0.3; animation: pulse-ring 1.4s ease-out 0.2s infinite; }
.speaking-active .ring-3 { opacity: 0.15; animation: pulse-ring 1.4s ease-out 0.4s infinite; }

.listening-active .ring-1 { border-color: var(--warm); opacity: 0.6; animation: pulse-ring 0.9s ease-out infinite; }
.listening-active .ring-2 { border-color: var(--warm); opacity: 0.35; animation: pulse-ring 0.9s ease-out 0.15s infinite; }
.listening-active .ring-3 { border-color: var(--warm); opacity: 0.15; animation: pulse-ring 0.9s ease-out 0.3s infinite; }

@keyframes pulse-ring {
  0%   { transform: scale(1);   opacity: inherit; }
  80%  { transform: scale(1.08); }
  100% { transform: scale(1.12); opacity: 0; }
}

/* Avatar circle */
.avatar-face {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, #1e2d4a, #0a0f1a);
  border: 2px solid rgba(0,229,255,0.3);
  box-shadow: 0 0 40px rgba(0,229,255,0.12), inset 0 0 30px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.4s, box-shadow 0.4s;
}
.avatar-face.speaking {
  border-color: rgba(0,229,255,0.7);
  box-shadow: 0 0 60px rgba(0,229,255,0.25), inset 0 0 30px rgba(0,0,0,0.5);
}
.avatar-face.listening {
  border-color: rgba(255,107,53,0.7);
  box-shadow: 0 0 60px rgba(255,107,53,0.2), inset 0 0 30px rgba(0,0,0,0.5);
}

/* SVG face */
.face-svg { width: 100px; height: 100px; }

/* Mouth wave canvas */
#mouth-canvas {
  position: absolute;
  bottom: 28px;
  width: 60px; height: 20px;
}

/* ── SUBTITLE / TRANSCRIPT ── */
.subtitle-box {
  width: 100%;
  min-height: 80px;
  max-height: 120px;
  background: rgba(15,22,36,0.8);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,229,255,0.12);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}
.subtitle-speaker {
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--accent);
  opacity: 0.7;
}
.subtitle-speaker.you { color: var(--warm); }
#subtitle-text {
  font-size: 0.95rem;
  font-weight: 400;
  line-height: 1.45;
  color: var(--text);
  min-height: 1.4em;
}
.correction-text {
  font-size: 0.75rem;
  color: #fbbf24;
  font-style: italic;
  margin-top: 4px;
  display: none;
}

/* ── BIG MIC BUTTON ── */
.mic-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

#mic-btn {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #1a2540, #0c1220);
  border: 2px solid var(--muted);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
#mic-btn.active {
  border-color: var(--warm);
  box-shadow: 0 0 0 4px rgba(255,107,53,0.2), 0 4px 24px rgba(0,0,0,0.5);
  background: radial-gradient(circle at 40% 35%, #2a1510, #0c1220);
}
#mic-btn:active { transform: scale(0.94); }

#mic-btn svg { transition: all 0.2s; }
#mic-btn.active svg { filter: drop-shadow(0 0 6px var(--warm)); }

.mic-label {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  transition: color 0.3s;
}
.mic-label.active { color: var(--warm); }

/* ── SCENARIO MODAL ── */
#scenario-modal {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: rgba(8,12,20,0.92);
  backdrop-filter: blur(10px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  gap: 16px;
}
#scenario-modal.open { display: flex; }

.modal-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  margin-bottom: 4px;
}
.modal-sub {
  font-size: 0.78rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 8px;
}
.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
}
.modal-chip {
  background: rgba(15,22,36,0.9);
  border: 1.5px solid var(--muted);
  border-radius: 14px;
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.modal-chip:active, .modal-chip.sel {
  border-color: var(--accent);
  background: rgba(0,229,255,0.08);
  box-shadow: 0 0 20px rgba(0,229,255,0.1);
}
.modal-chip .ic { font-size: 1.8rem; display: block; margin-bottom: 6px; }
.modal-chip .lbl {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text);
}

.level-row {
  display: flex; gap: 8px; justify-content: center; width: 100%;
}
.lvl-btn {
  flex: 1;
  border: 1.5px solid var(--muted);
  border-radius: 10px;
  padding: 10px;
  background: rgba(15,22,36,0.8);
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.lvl-btn.sel {
  border-color: var(--accent2);
  color: #c4b5fd;
  background: rgba(124,58,237,0.12);
}

.modal-start {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 20px rgba(0,229,255,0.2);
  transition: all 0.2s;
}
.modal-start:active { transform: scale(0.97); }

/* ── WAVEFORM BAR VISUALIZER ── */
.waveform {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 28px;
}
.wbar {
  width: 3px;
  background: var(--accent);
  border-radius: 3px;
  height: 4px;
  transition: height 0.1s;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 120px;
  left: 50%; transform: translateX(-50%);
  background: rgba(15,22,36,0.95);
  border: 1px solid var(--accent);
  color: var(--text);
  font-size: 0.8rem;
  padding: 10px 18px;
  border-radius: 20px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  text-align: center;
  max-width: 80vw;
  backdrop-filter: blur(10px);
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div id="app">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">TravelTalk</div>
    <div class="scenario-badge" onclick="openModal()">✈️ <span id="scenario-label">Aeroporto</span></div>
  </div>

  <!-- STATUS -->
  <div class="status-pill" id="status-pill">In attesa</div>

  <!-- AVATAR -->
  <div class="avatar-wrap">
    <div class="avatar-ring-outer" id="ring-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="avatar-face" id="avatar-face">
        <!-- SVG Face -->
        <svg class="face-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Head glow -->
          <circle cx="50" cy="44" r="30" fill="url(#headGrad)" opacity="0.9"/>
          <!-- Eyes -->
          <ellipse id="eye-l" cx="38" cy="38" rx="5" ry="6" fill="#00e5ff" opacity="0.9"/>
          <ellipse id="eye-r" cx="62" cy="38" rx="5" ry="6" fill="#00e5ff" opacity="0.9"/>
          <!-- Eye pupils -->
          <ellipse cx="39" cy="39" rx="2.5" ry="3" fill="#080c14"/>
          <ellipse cx="63" cy="39" rx="2.5" ry="3" fill="#080c14"/>
          <!-- Eye shine -->
          <circle cx="40" cy="37" r="1" fill="white" opacity="0.8"/>
          <circle cx="64" cy="37" r="1" fill="white" opacity="0.8"/>
          <!-- Subtle eyebrows -->
          <path d="M33 31 Q38 28 43 31" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <path d="M57 31 Q62 28 67 31" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <!-- Cheek glow -->
          <ellipse cx="32" cy="48" rx="6" ry="3" fill="#ff6b35" opacity="0.12"/>
          <ellipse cx="68" cy="48" rx="6" ry="3" fill="#ff6b35" opacity="0.12"/>
          <defs>
            <radialGradient id="headGrad" cx="40%" cy="35%" r="60%">
              <stop offset="0%" stop-color="#1e3a5f"/>
              <stop offset="100%" stop-color="#0a0f1a"/>
            </radialGradient>
          </defs>
        </svg>
        <!-- Mouth canvas -->
        <canvas id="mouth-canvas"></canvas>
      </div>
    </div>

    <!-- Waveform -->
    <div class="waveform" id="waveform">
      <!-- bars generated by JS -->
    </div>
  </div>

  <!-- SUBTITLE -->
  <div class="subtitle-box">
    <div class="subtitle-speaker" id="speaker-label">TravelTalk</div>
    <div id="subtitle-text">Tocca il microfono per iniziare a parlare 🎤</div>
    <div class="correction-text" id="correction-text"></div>
  </div>

  <!-- MIC BUTTON -->
  <div class="mic-section">
    <button id="mic-btn" onclick="toggleMic()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <rect x="9" y="2" width="6" height="12" rx="3" fill="#e8edf5"/>
        <path d="M5 10a7 7 0 0014 0" stroke="#e8edf5" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="19" x2="12" y2="22" stroke="#e8edf5" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="22" x2="16" y2="22" stroke="#e8edf5" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="mic-label" id="mic-label">Tieni premuto o tocca</div>
  </div>
</div>

<!-- SCENARIO MODAL -->
<div id="scenario-modal">
  <div class="modal-title">Scegli lo scenario</div>
  <div class="modal-sub">Parla completamente a mani libere 🚗</div>
  <div class="modal-grid">
    <div class="modal-chip sel" onclick="pickScenario(this,'airport','✈️ Aeroporto')" data-s="airport">
      <span class="ic">✈️</span><span class="lbl">Aeroporto</span>
    </div>
    <div class="modal-chip" onclick="pickScenario(this,'hotel','🏨 Hotel')" data-s="hotel">
      <span class="ic">🏨</span><span class="lbl">Hotel</span>
    </div>
    <div class="modal-chip" onclick="pickScenario(this,'meeting','🤝 Riunione')" data-s="meeting">
      <span class="ic">🤝</span><span class="lbl">Riunione</span>
    </div>
    <div class="modal-chip" onclick="pickScenario(this,'restaurant','🍽️ Ristorante')" data-s="restaurant">
      <span class="ic">🍽️</span><span class="lbl">Ristorante</span>
    </div>
  </div>
  <div class="level-row">
    <button class="lvl-btn sel" onclick="pickLevel(this,'A2')">A2 Base</button>
    <button class="lvl-btn" onclick="pickLevel(this,'B1')">B1 Medio</button>
    <button class="lvl-btn" onclick="pickLevel(this,'B2')">B2 Avanzato</button>
  </div>
  <button class="modal-start" onclick="startSession()">▶ Inizia sessione vocale</button>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════════════
(function(){
  const c = document.getElementById('canvas-bg');
  const ctx = c.getContext('2d');
  let W, H, stars = [];
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  function init(){
    stars = [];
    for(let i=0;i<120;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.2+0.2,
      o:Math.random()*0.5+0.1,
      s:Math.random()*0.3+0.05
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.o += Math.sin(Date.now()*s.s*0.001)*0.005;
      s.o = Math.max(0.05, Math.min(0.65, s.o));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,229,255,${s.o})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init();});
  resize(); init(); draw();
})();

// ═══════════════════════════════════════════════════════
// WAVEFORM BARS
// ═══════════════════════════════════════════════════════
const waveEl = document.getElementById('waveform');
const BARS = 20;
const bars = [];
for(let i=0;i<BARS;i++){
  const b=document.createElement('div');
  b.className='wbar';
  waveEl.appendChild(b);
  bars.push(b);
}
let waveActive = false;
let waveColor = '#00e5ff';
function animateWave(){
  if(!waveActive){ bars.forEach(b=>b.style.height='4px'); return; }
  bars.forEach((b,i)=>{
    const h = Math.max(3, Math.random()*22);
    b.style.height = h+'px';
    b.style.background = waveColor;
  });
  setTimeout(animateWave, 80);
}
function startWave(color){
  waveColor = color||'#00e5ff';
  waveActive=true;
  animateWave();
}
function stopWave(){ waveActive=false; }

// ═══════════════════════════════════════════════════════
// STATE  (declared first so all code below can reference it)
// ═══════════════════════════════════════════════════════
let currentScenario='airport';
let currentLevel='A2';
let chatHistory=[];
let isListening=false;
let isSpeaking=false;
let recognition=null;
let sessionActive=false;
let currentUtterance=null;

// ═══════════════════════════════════════════════════════
// MOUTH CANVAS (speaking animation)
// ═══════════════════════════════════════════════════════
const mouthCanvas = document.getElementById('mouth-canvas');
const mctx = mouthCanvas.getContext('2d');
mouthCanvas.width=60; mouthCanvas.height=20;
let mouthOpen=0, mouthTarget=0, mouthAnimId=null;
function drawMouth(){
  mctx.clearRect(0,0,60,20);
  const open = mouthOpen;
  mctx.beginPath();
  mctx.moveTo(8,10);
  mctx.quadraticCurveTo(30,10+open,52,10);
  mctx.strokeStyle='rgba(0,229,255,0.85)';
  mctx.lineWidth=2;
  mctx.lineCap='round';
  mctx.stroke();
  if(open>2){
    mctx.beginPath();
    mctx.moveTo(10,10);
    mctx.quadraticCurveTo(30,10+open*0.6,50,10);
    mctx.fillStyle='rgba(0,20,30,0.7)';
    mctx.fill();
  }
}
function animateMouth(){
  mouthTarget = isSpeaking ? (4 + Math.random()*10) : 0;
  mouthOpen += (mouthTarget - mouthOpen)*0.3;
  drawMouth();
  mouthAnimId = requestAnimationFrame(animateMouth);
}
animateMouth();

// ═══════════════════════════════════════════════════════
// EYE BLINK
// ═══════════════════════════════════════════════════════
function blink(){
  const el = document.getElementById('eye-l');
  const er = document.getElementById('eye-r');
  if(!el||!er) return;
  el.setAttribute('ry','1'); er.setAttribute('ry','1');
  setTimeout(()=>{ el.setAttribute('ry','6'); er.setAttribute('ry','6'); },120);
  setTimeout(blink, 2800+Math.random()*3000);
}
blink();

const scenarioNames={airport:'Aeroporto',hotel:'Hotel',meeting:'Riunione',restaurant:'Ristorante'};
const scenarioPrompts={
  airport:'sei un addetto al check-in / agente di gate in un aeroporto internazionale',
  hotel:'sei un receptionist di un hotel business di alto livello',
  meeting:'sei un collega di lavoro anglofono in una riunione di lavoro internazionale',
  restaurant:'sei un cameriere di un ristorante in un paese anglofono'
};

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════
function setStatus(s, type){
  const el=document.getElementById('status-pill');
  el.textContent=s;
  el.className='status-pill '+(type||'');
}
function setSubtitle(text, who, correction){
  document.getElementById('subtitle-text').textContent=text;
  const sp=document.getElementById('speaker-label');
  if(who==='you'){ sp.textContent='Tu'; sp.className='subtitle-speaker you'; }
  else { sp.textContent='TravelTalk'; sp.className='subtitle-speaker'; }
  const cor=document.getElementById('correction-text');
  if(correction){ cor.textContent=correction; cor.style.display='block'; }
  else { cor.style.display='none'; }
}
function setAvatarState(state){
  const face=document.getElementById('avatar-face');
  const ring=document.getElementById('ring-wrap');
  face.className='avatar-face '+(state||'');
  ring.className='avatar-ring-outer '+(state==='speaking'?'speaking-active':state==='listening'?'listening-active':'');
}
function toast(msg, ms=2400){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(){
  stopMic(); stopSpeech();
  document.getElementById('scenario-modal').classList.add('open');
}
function pickScenario(el,s,label){
  document.querySelectorAll('.modal-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  currentScenario=s;
}
function pickLevel(el,l){
  document.querySelectorAll('.lvl-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  currentLevel=l;
}
function startSession(){
  document.getElementById('scenario-modal').classList.remove('open');
  document.getElementById('scenario-label').textContent=scenarioNames[currentScenario];
  chatHistory=[];
  sessionActive=true;
  aiGreet();
}

// ═══════════════════════════════════════════════════════
// SPEECH SYNTHESIS (TTS)
// ═══════════════════════════════════════════════════════
function getBestVoice(lang){
  if(!TTS) return null;
  const voices=TTS.getVoices();
  if(lang==='it'){
    const itPref=['Alice','Google italiano','Federica','Luca'];
    for(const name of itPref){ const found=voices.find(vo=>vo.name===name); if(found) return found; }
    return voices.find(vo=>vo.lang&&vo.lang.startsWith('it'))||null;
  } else {
    const enPref=['Samantha','Google US English','Karen','Moira'];
    for(const name of enPref){ const found=voices.find(vo=>vo.name===name); if(found) return found; }
    return voices.find(vo=>vo.lang&&vo.lang.startsWith('en'))||null;
  }
}

function speakRaw(text, lang, color){
  return new Promise(resolve=>{
    if(!TTS){ resolve(); return; }
    TTS.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    currentUtterance=utt;
    utt.lang=lang==='it'?'it-IT':'en-US';
    utt.rate=lang==='it'?0.95:0.92;
    utt.pitch=1.05;
    const voice=getBestVoice(lang);
    if(voice) utt.voice=voice;
    isSpeaking=true;
    setAvatarState('speaking');
    setStatus(lang==='it'?'Correzione in italiano…':'Sta parlando…','speaking');
    startWave(color||'#00e5ff');
    utt.onend=()=>{ isSpeaking=false; stopWave(); setAvatarState(''); resolve(); };
    utt.onerror=()=>{ isSpeaking=false; stopWave(); setAvatarState(''); resolve(); };
    TTS.speak(utt);
  });
}

// Speak English reply, then Italian correction if present
async function speakText(englishText, italianNote){
  await speakRaw(englishText,'en','#00e5ff');
  if(italianNote){
    await new Promise(r=>setTimeout(r,350));
    setSubtitle(italianNote,'ai',null);
    document.getElementById('speaker-label').textContent='💡 Correzione';
    document.getElementById('speaker-label').className='subtitle-speaker';
    await speakRaw('Correzione: '+italianNote,'it','#fbbf24');
  }
}

function stopSpeech(){
  if(TTS) TTS.cancel();
  isSpeaking=false; stopWave(); setAvatarState('');
}

// Safe TTS reference — speechSynthesis can be undefined on Android at parse time
const TTS = (typeof speechSynthesis !== 'undefined') ? speechSynthesis : null;

function loadVoices(){ if(TTS) TTS.getVoices(); }
if(TTS && 'onvoiceschanged' in TTS){ TTS.onvoiceschanged = loadVoices; }
setTimeout(loadVoices, 300);

// ═══════════════════════════════════════════════════════
// SPEECH RECOGNITION (STT)
// ═══════════════════════════════════════════════════════
function setupRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast('❌ Speech recognition non supportato su questo browser'); return null; }
  const r=new SR();
  r.lang='en-US';
  r.interimResults=true;
  r.continuous=false;
  r.onstart=()=>{
    isListening=true;
    setStatus('In ascolto…','listening');
    setAvatarState('listening');
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-label').classList.add('active');
    document.getElementById('mic-label').textContent='Sto ascoltando…';
    startWave('#ff6b35');
    setSubtitle('…','you');
  };
  r.onresult=e=>{
    let interim='', final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    setSubtitle((final||interim)||'…','you');
    if(final) handleUserSpeech(final.trim());
  };
  r.onerror=err=>{
    isListening=false;
    setAvatarState('');
    stopWave();
    resetMicUI();
    if(err.error==='no-speech') toast('Non ho sentito nulla. Riprova!');
    else if(err.error==='not-allowed') toast('❌ Microfono bloccato. Consenti l\'accesso.');
    else toast('Errore microfono: '+err.error);
  };
  r.onend=()=>{
    isListening=false;
    resetMicUI();
    stopWave();
    if(!isSpeaking) setAvatarState('');
  };
  return r;
}

function resetMicUI(){
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-label').classList.remove('active');
  document.getElementById('mic-label').textContent='Tieni premuto o tocca';
  setStatus(sessionActive?'Tuo turno – parla!':'In attesa','');
}

function toggleMic(){
  if(isSpeaking){ stopSpeech(); toast('Interrotto'); return; }
  if(isListening){ stopMic(); return; }
  if(!sessionActive){ openModal(); return; }
  startMic();
}

function startMic(){
  recognition=setupRecognition();
  if(!recognition) return;
  try{ recognition.start(); } catch(e){ toast('Microfono non disponibile'); }
}
function stopMic(){
  if(recognition){ try{recognition.stop();}catch(e){} recognition=null; }
  isListening=false; resetMicUI(); stopWave();
}

// ═══════════════════════════════════════════════════════
// AI GREETING
// ═══════════════════════════════════════════════════════
async function aiGreet(){
  setStatus('Sto preparando…','thinking');
  setAvatarState('');
  const sys=buildSystem();
  const prompt='Start the conversation now with a natural, short opening line as your character. Be warm and direct. Max 2 sentences.';
  try{
    const reply=await callClaude(sys, prompt);
    const clean=strip(reply,'msg');
    const note=strip(reply,'note');
    chatHistory.push({role:'assistant',content:reply});
    setSubtitle(clean,'ai', note||null);
    await speakText(clean, note||null);
    setStatus('Tuo turno – parla!','');
  } catch(e){
    setStatus('Errore connessione','');
    setSubtitle('Errore di connessione. Controlla internet.','ai');
  }
}

// ═══════════════════════════════════════════════════════
// HANDLE USER SPEECH
// ═══════════════════════════════════════════════════════
async function handleUserSpeech(text){
  if(!text) return;
  chatHistory.push({role:'user',content:text});
  setSubtitle(text,'you');
  setStatus('Sto pensando…','thinking');
  setAvatarState('');

  try{
    const reply=await callClaude(buildSystem(), null, chatHistory);
    const clean=strip(reply,'msg');
    const note=strip(reply,'note');
    chatHistory.push({role:'assistant',content:reply});
    setSubtitle(clean,'ai',note||null);
    await speakText(clean, note||null);
    setStatus('Tuo turno – parla!','');
  } catch(e){
    setStatus('Errore','');
    setSubtitle('Errore connessione. Riprova.','ai');
  }
}

// ═══════════════════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════════════════
function buildSystem(){
  return `You are an English conversation tutor for an Italian speaker who is driving a car. You are playing a character: ${scenarioPrompts[currentScenario]}. The user's English level is ${currentLevel}.

Rules:
1. ALWAYS reply in English as your character. Keep it natural, concise (2-4 sentences max).
2. After your character's response, if the user made a grammar/vocabulary mistake worth noting, add a brief note in Italian using this exact format: [NOTE: correzione breve in italiano]
3. Do NOT use [NOTE:...] if there are no significant mistakes.
4. Be encouraging, warm, and realistic to the scenario.
5. Adapt vocabulary complexity to level ${currentLevel}.`;
}

async function callClaude(system, userMsg, history){
  let messages;
  if(history&&history.length>0) messages=[...history];
  else messages=[{role:'user',content:userMsg}];
  const body={model:'claude-sonnet-4-20250514',max_tokens:300,messages};
  if(system) body.system=system;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01'},
    body:JSON.stringify(body)
  });
  const data=await res.json();
  return data.content.map(c=>c.text||'').join('');
}

function strip(text, part){
  const noteMatch=text.match(/\[NOTE:\s*(.*?)\]/i);
  if(part==='note') return noteMatch? noteMatch[1].trim():null;
  return text.replace(/\[NOTE:.*?\]/gi,'').trim();
}
